<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 650" width="100%" height="100%">
  <!-- Transparent Background Cutout of Male Cardiologist (Dr. R. K. Siddhartha) -->
  <defs>
    <linearGradient id="coatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E5A882"/>
      <stop offset="100%" stop-color="#C27D56"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22150E"/>
      <stop offset="100%" stop-color="#0A0503"/>
    </linearGradient>
    <linearGradient id="stethoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Neck & Shoulders -->
    <path d="M 215 220 L 285 220 L 295 280 L 205 280 Z" fill="url(#skinGrad)"/>

    <!-- Tie & Collar Shirt -->
    <path d="M 230 260 L 270 260 L 280 320 L 220 320 Z" fill="#3B82F6"/>
    <!-- Red Accent Tie -->
    <path d="M 245 260 L 255 260 L 260 380 L 250 400 L 240 380 Z" fill="#E52320"/>

    <!-- Torso & White Lab Coat -->
    <path d="M 140 310 Q 250 280 360 310 L 400 650 L 100 650 Z" fill="url(#coatGrad)"/>
    <path d="M 175 310 L 230 440 L 205 440 L 150 320 Z" fill="#CBD5E1"/>
    <path d="M 325 310 L 270 440 L 295 440 L 350 320 Z" fill="#CBD5E1"/>

    <!-- Stethoscope -->
    <path d="M 200 270 Q 195 340 228 385 Q 250 410 272 385 Q 305 340 300 270" stroke="url(#stethoGrad)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <circle cx="272" cy="385" r="15" fill="#64748B" stroke="#334155" stroke-width="3"/>
    <circle cx="272" cy="385" r="9" fill="#E2E8F0"/>

    <!-- Head & Face -->
    <path d="M 195 170 Q 195 230 250 238 Q 305 230 305 170 Q 305 110 250 110 Q 195 110 195 170 Z" fill="url(#skinGrad)"/>

    <!-- Male Hair -->
    <path d="M 190 150 C 190 100 230 85 260 85 C 295 85 315 110 312 150 C 300 120 270 105 240 110 C 210 115 195 130 190 150 Z" fill="url(#hairGrad)"/>

    <!-- Eyes -->
    <ellipse cx="230" cy="165" rx="7" ry="5" fill="#1E293B"/>
    <ellipse cx="270" cy="165" rx="7" ry="5" fill="#1E293B"/>
    <circle cx="231" cy="163" r="2" fill="#FFFFFF"/>
    <circle cx="271" cy="163" r="2" fill="#FFFFFF"/>
    <path d="M 220 153 Q 230 147 240 152" stroke="#22150E" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 260 152 Q 270 147 280 153" stroke="#22150E" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Glasses (Intellectual Specialist Look) -->
    <rect x="212" y="152" width="34" height="24" rx="4" fill="none" stroke="#334155" stroke-width="3"/>
    <rect x="254" y="152" width="34" height="24" rx="4" fill="none" stroke="#334155" stroke-width="3"/>
    <line x1="246" y1="162" x2="254" y2="162" stroke="#334155" stroke-width="3"/>

    <!-- Nose -->
    <path d="M 250 165 L 246 186 L 254 186" stroke="#A66843" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Smile -->
    <path d="M 232 204 Q 250 218 268 204" stroke="#000000" stroke-width="2" fill="#FFFFFF"/>
  </g>
</svg>
