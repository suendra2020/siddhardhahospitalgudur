    <circle cx="231" cy="173" r="2" fill="#FFFFFF"/>
    <circle cx="271" cy="173" r="2" fill="#FFFFFF"/>
    <path d="M 220 163 Q 230 158 240 163" stroke="#24140C" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 260 163 Q 270 158 280 163" stroke="#24140C" stroke-width="3" fill="none" stroke-linecap="round"/>

    <path d="M 250 175 L 246 192 L 254 192" stroke="#A66843" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 232 208 Q 250 224 268 208" stroke="#000000" stroke-width="2" fill="#FFFFFF"/>
    <path d="M 235 208 Q 250 220 265 208" fill="#E11D48"/>
