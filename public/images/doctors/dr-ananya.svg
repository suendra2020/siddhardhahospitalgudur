<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 650" width="100%" height="100%">
  <!-- Transparent Background Cutout of Female Neurosurgeon (Dr. Ananya Murthy) -->
  <defs>
    <linearGradient id="coatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E5A882"/>
      <stop offset="100%" stop-color="#C27D56"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0F0A"/>
      <stop offset="100%" stop-color="#050302"/>
    </linearGradient>
    <linearGradient id="stethoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <path d="M 170 140 C 150 220 160 360 170 420 L 330 420 C 340 360 350 220 330 140 Z" fill="url(#hairGrad)"/>
    <path d="M 220 220 L 280 220 L 290 280 L 210 280 Z" fill="url(#skinGrad)"/>
    <path d="M 225 260 L 275 260 L 285 320 L 215 320 Z" fill="#6D28D9"/>
    <path d="M 150 320 Q 250 290 350 320 L 390 650 L 110 650 Z" fill="url(#coatGrad)"/>
    <path d="M 180 320 L 235 440 L 215 440 L 160 330 Z" fill="#CBD5E1"/>
    <path d="M 320 320 L 265 440 L 285 440 L 340 330 Z" fill="#CBD5E1"/>

    <path d="M 205 270 Q 200 340 230 380 Q 250 400 270 380 Q 300 340 295 270" stroke="url(#stethoGrad)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <circle cx="270" cy="380" r="14" fill="#64748B" stroke="#334155" stroke-width="3"/>
    <circle cx="270" cy="380" r="8" fill="#E2E8F0"/>

    <ellipse cx="250" cy="180" rx="54" ry="66" fill="url(#skinGrad)"/>
    <path d="M 195 155 C 200 105 250 95 295 115 C 310 125 305 165 305 175 C 290 135 240 130 205 155 Z" fill="url(#hairGrad)"/>

    <ellipse cx="230" cy="175" rx="7" ry="5" fill="#1E293B"/>
    <ellipse cx="270" cy="175" rx="7" ry="5" fill="#1E293B"/>
    <circle cx="231" cy="173" r="2" fill="#FFFFFF"/>
    <circle cx="271" cy="173" r="2" fill="#FFFFFF"/>
    <path d="M 220 163 Q 230 158 240 163" stroke="#1A0F0A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 260 163 Q 270 158 280 163" stroke="#1A0F0A" stroke-width="3" fill="none" stroke-linecap="round"/>

    <path d="M 250 175 L 246 192 L 254 192" stroke="#A86E4B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 232 208 Q 250 224 268 208" stroke="#000000" stroke-width="2" fill="#FFFFFF"/>
    <path d="M 235 208 Q 250 220 265 208" fill="#E11D48"/>
  </g>
</svg>
